<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Admission Form</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: linear-gradient(135deg, #71b7e6, #9b59b6); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .container { background-color: #ffffff; max-width: 600px; width: 100%; border-radius: 12px; padding: 30px; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15); }
        .title { font-size: 24px; font-weight: 600; text-align: center; margin-bottom: 20px; color: #333; }
        .form-group { margin-bottom: 15px; }
        .form-row { display: flex; gap: 15px; }
        label { display: block; font-weight: 500; margin-bottom: 5px; font-size: 13px; color: #2c3e50; }
        input, select, textarea { width: 100%; padding: 10px; font-size: 14px; border: 1px solid #ccc; border-radius: 6px; outline: none; background: #f8f9fa; }
        .otp-section { background: #f0f4f8; padding: 15px; border-radius: 8px; border: 1px dashed #9b59b6; margin-bottom: 15px; }
        .btn-small { padding: 8px 12px; cursor: pointer; border-radius: 4px; border: none; background: #9b59b6; color: white; font-size: 12px; }
        .submit-btn { width: 100%; padding: 12px; background: #28a745; color: #fff; font-weight: 600; border: none; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        .submit-btn:disabled { background: #ccc; cursor: not-allowed; }
        .msg { font-size: 12px; margin-top: 5px; font-weight: bold; }
        .file-upload-box { border: 1px solid #ccc; padding: 10px; border-radius: 6px; background: #fff; }
        @media (max-width: 500px) { .form-row { flex-direction: column; gap: 0; } }
    </style>
</head>
<body>

<div class="container">
    <div class="title">Student Admission Portal</div>
    
    <form action="/submit" method="POST" enctype="multipart/form-data">
        
        <div class="form-row">
            <div class="form-group" style="flex:1;"><label>First Name</label><input type="text" name="first_name" required></div>
            <div class="form-group" style="flex:1;"><label>Last Name</label><input type="text" name="last_name" required></div>
        </div>
        
        <div class="form-row">
            <div class="form-group" style="flex:1;"><label>Father's Name</label><input type="text" name="father_name" required></div>
            <div class="form-group" style="flex:1;"><label>Mother's Name</label><input type="text" name="mother_name" required></div>
        </div>

        <div class="otp-section">
            <label>Email ID Verification</label>
            <div style="display: flex; gap: 10px;">
                <input type="email" id="email" name="email" placeholder="example@gmail.com" required>
                <button type="button" class="btn-small" onclick="sendOTP()">Send OTP</button>
            </div>
            <div id="otpInputArea" style="display: none; margin-top: 10px;">
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="otp_code" placeholder="Enter 6-digit code">
                    <button type="button" class="btn-small" style="background:#27ae60;" onclick="verifyOTP()">Verify</button>
                </div>
            </div>
            <p id="otpMsg" class="msg"></p>
        </div>

        <div class="form-row">
            <div class="form-group" style="flex:1;"><label>Mobile Number</label><input type="tel" name="mobile" required></div>
            <div class="form-group" style="flex:1;"><label>Date of Birth</label><input type="date" name="dob" required></div>
        </div>

        <div class="form-row">
            <div class="form-group" style="flex:1;"><label>Course</label>
                <select name="course" required>
                    <option value="B.Sc. 2nd Year">B.Sc. 2nd Year (PCM)</option>
                    <option value="B.Sc. 1st Year">B.Sc. 1st Year</option>
                    <option value="B.A.">B.A.</option>
                </select>
            </div>
            <div class="form-group" style="flex:1;"><label>Roll Number</label><input type="text" name="roll_no" required></div>
        </div>

        <div class="form-row">
            <div class="form-group file-upload-box" style="flex:1;">
                <label>Passport Size Photo</label>
                <input type="file" name="photo" accept="image/jpeg, image/png, image/jpg" required>
            </div>
            <div class="form-group file-upload-box" style="flex:1;">
                <label>Signature</label>
                <input type="file" name="signature" accept="image/jpeg, image/png, image/jpg" required>
            </div>
        </div>

        <div class="form-group"><label>Permanent Address</label><textarea name="address" rows="2" required></textarea></div>

        <button type="submit" id="submitBtn" class="submit-btn" disabled>Submit & Generate Slip</button>
    </form>
</div>

<script>
    function sendOTP() {
        const email = document.getElementById('email').value;
        if(!email) return alert("Pehle Email bhariye");
        document.getElementById('otpMsg').innerText = "OTP bhej rahe hain...";
        
        fetch('/send_otp', {
            method: 'POST',
            headers: {'Content-Type': 'application/x-www-form-urlencoded'},
            body: `email=${email}`
        }).then(res => res.json()).then(data => {
            if(data.status === 'success') {
                document.getElementById('otpInputArea').style.display = 'block';
                document.getElementById('otpMsg').style.color = 'green';
                document.getElementById('otpMsg').innerText = "OTP Email par bhej diya gaya hai!";
            } else { alert("Error: " + data.message); }
        });
    }

    function verifyOTP() {
        const code = document.getElementById('otp_code').value;
        fetch('/verify_otp', {
            method: 'POST',
            headers: {'Content-Type': 'application/x-www-form-urlencoded'},
            body: `otp=${code}`
        }).then(res => res.json()).then(data => {
            if(data.status === 'success') {
                document.getElementById('otpMsg').style.color = 'blue';
                document.getElementById('otpMsg').innerText = "Email Verified Successfully!";
                document.getElementById('submitBtn').disabled = false;
                document.getElementById('email').readOnly = true;
            } else { alert("Galat OTP!"); }
        });
    }
</script>
</body>
</html>
