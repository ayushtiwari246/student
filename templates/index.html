<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comprehensive Student Registration</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: linear-gradient(135deg, #71b7e6, #9b59b6); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
        .container { background-color: #ffffff; max-width: 600px; width: 100%; border-radius: 12px; padding: 40px 30px; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15); }
        .title { font-size: 24px; font-weight: 600; color: #333; text-align: center; margin-bottom: 5px; }
        .subtitle { font-size: 14px; color: #666; text-align: center; margin-bottom: 25px; }
        
        .form-row { display: flex; gap: 15px; margin-bottom: 15px; }
        .form-group { flex: 1; }
        .form-group.full-width { margin-bottom: 15px; }
        
        label { display: block; font-weight: 500; margin-bottom: 5px; color: #2c3e50; font-size: 13px; }
        input, select, textarea { width: 100%; padding: 10px 12px; font-size: 14px; border: 1px solid #ccc; border-radius: 6px; outline: none; background-color: #f8f9fa; transition: all 0.3s ease; }
        input:focus, select:focus, textarea:focus { border-color: #9b59b6; background-color: #fff; box-shadow: 0 0 5px rgba(155, 89, 182, 0.3); }
        textarea { resize: vertical; height: 80px; }
        
        .submit-btn { width: 100%; padding: 12px; background: linear-gradient(135deg, #71b7e6, #9b59b6); color: #fff; font-size: 16px; font-weight: 600; border: none; border-radius: 8px; cursor: pointer; transition: background 0.3s ease; margin-top: 15px; }
        .submit-btn:hover { background: linear-gradient(-135deg, #71b7e6, #9b59b6); }

        @media (max-width: 600px) { .form-row { flex-direction: column; gap: 0; } .form-group { margin-bottom: 15px; } }
    </style>
</head>
<body>

    <div class="container">
        <div class="title">Student Admission Form</div>
        <div class="subtitle">Please fill all the details carefully</div>
        
        <form action="/submit" method="POST">
            
            <div class="form-group full-width">
                <label>Full Name</label>
                <input type="text" name="name" placeholder="Enter your full name" required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Father's Name</label>
                    <input type="text" name="father_name" placeholder="Enter father's name" required>
                </div>
                <div class="form-group">
                    <label>Mother's Name</label>
                    <input type="text" name="mother_name" placeholder="Enter mother's name" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Date of Birth</label>
                    <input type="date" name="dob" required>
                </div>
                <div class="form-group">
                    <label>Gender</label>
                    <select name="gender" required>
                        <option value="" disabled selected>Select Gender</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Mobile Number</label>
                    <input type="tel" name="mobile" placeholder="10-digit mobile number" pattern="[0-9]{10}" required>
                </div>
                <div class="form-group">
                    <label>Email ID</label>
                    <input type="email" name="email" placeholder="example@email.com" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Course / Program</label>
                    <select name="course" required>
                        <option value="" disabled selected>Select Course</option>
                        <option value="B.Sc.">B.Sc.</option>
                        <option value="B.A.">B.A.</option>
                        <option value="B.Com.">B.Com.</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Roll Number</label>
                    <input type="text" name="roll_no" placeholder="e.g. 23045" required>
                </div>
            </div>

            <div class="form-group full-width">
                <label>Permanent Address</label>
                <textarea name="address" placeholder="Enter your full address" required></textarea>
            </div>

            <button type="submit" class="submit-btn">Submit Form</button>
            
        </form>
    </div>

</body>
                            </html>
